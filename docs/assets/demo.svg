  <text x="24" y="116" fill="#79c0ff">.claude/settings.json</text>
  <text x="24" y="136" fill="#c9d1d9">  <tspan fill="#f85149">error E103</tspan> hooks › PreToolUse[0] › hooks[0] › command</text>
