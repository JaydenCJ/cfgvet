  <text x="24" y="324" fill="#79c0ff">.mcp.json</text>
  <text x="24" y="344" fill="#c9d1d9">  <tspan fill="#d29922">warning W202</tspan> server › db</text>
  <text x="24" y="362" fill="#8b949e">      server "db" differs across harnesses: .mcp.json has `stdio: npx -y db-mcp`; .cursor/mcp.json has …</text>
  <text x="24" y="384" fill="#c9d1d9">  <tspan fill="#a5d6ff">info I301</tspan> server › docs</text>
  <text x="24" y="402" fill="#8b949e">      server "docs" is configured for claude but missing from .cursor/mcp.json and .vscode/mcp.json</text>

