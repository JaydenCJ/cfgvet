  <text x="24" y="172" fill="#3fb950">      fix: chmod +x .claude/hooks/format.sh</text>
  <text x="24" y="194" fill="#c9d1d9">  <tspan fill="#f85149">error E104</tspan> hooks › postToolUse</text>
  <text x="24" y="212" fill="#8b949e">      "postToolUse" is not a hook event — these hooks will never fire (did you mean "PostToolUse"?)</text>
